name: Build Rubeus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Install .NET 4.0 Reference Assemblies
      run: |
        nuget install Microsoft.NETFramework.ReferenceAssemblies.net40 -Version 1.0.3 -OutputDirectory ./ref_asms

    - name: Restore NuGet packages
      run: nuget restore Rubeus.sln

    - name: Build solution
      run: |
        msbuild Rubeus.sln /p:Configuration=Release /p:Platform="Any CPU" /p:ReferencePath="${{ github.workspace }}/ref_asms/Microsoft.NETFramework.ReferenceAssemblies.net40.1.0.3/build/.NETFramework/v4.0/"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rubeus-Binary
        path: Rubeus/bin/Release/
